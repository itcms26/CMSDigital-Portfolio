<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS IB-PYP Digital Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .tab-btn-active { border-bottom: 3px solid #1e3a8a; color: #1e3a8a; font-weight: 800; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4" onload="initApp()">

    <div id="loading" class="loading-overlay hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-900 border-t-transparent mb-4"></div>
        <p class="text-blue-900 font-black uppercase text-[10px]">Processing...</p>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="max-w-md mx-auto mt-10 p-10 card fade-in">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-900 uppercase">CMS Portal</h1>
            <p class="text-gray-400 text-[10px] font-bold uppercase mt-1">Digital Portfolio System</p>
        </div>

        <div class="space-y-4">
            <select id="role-select" class="w-full p-4 bg-gray-50 border-2 border-transparent rounded-2xl font-bold outline-none focus:border-blue-500" onchange="toggleLoginUI()">
                <option value="student">Student</option>
                <option value="staff">Staff</option>
            </select>

            <div id="student-box">
                <input type="text" id="access-code" placeholder="Enter Student ID" class="w-full p-4 bg-gray-50 rounded-2xl text-center font-mono uppercase border-2 border-transparent focus:border-blue-500 outline-none">
            </div>

            <div id="staff-box" class="hidden">
                <input type="email" id="staff-email" placeholder="school-email@domain.com" class="w-full p-4 bg-gray-50 rounded-2xl text-center border-2 border-transparent focus:border-blue-500 outline-none">
                <p class="text-[9px] text-gray-400 mt-2 text-center uppercase font-bold tracking-widest">Enter registry-linked email</p>
            </div>

            <button onclick="handleLogin()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-black transition-all">ACCESS SYSTEM</button>
        </div>
    </div>

    <!-- STUDENT DASHBOARD -->
    <div id="student-dashboard" class="hidden max-w-5xl mx-auto fade-in">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 id="s-name" class="text-3xl font-black text-blue-900">---</h1>
                <p id="s-id" class="text-xs font-bold text-gray-400 uppercase tracking-widest">---</p>
            </div>
            <button onclick="location.reload()" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Logout</button>
        </div>

        <!-- Student Tabs -->
        <div class="flex space-x-6 border-b mb-6 overflow-x-auto no-scrollbar">
            <button onclick="switchStudentTab('academic')" id="s-tab-academic" class="tab-btn-active pb-3 text-[10px] font-black uppercase whitespace-nowrap">Academic</button>
            <button onclick="switchStudentTab('atl')" id="s-tab-atl" class="pb-3 text-[10px] font-black uppercase text-gray-400 whitespace-nowrap">ATL Skills</button>
            <button onclick="switchStudentTab('work')" id="s-tab-work" class="pb-3 text-[10px] font-black uppercase text-gray-400 whitespace-nowrap">Work Samples</button>
            <button onclick="switchStudentTab('reflection')" id="s-tab-reflection" class="pb-3 text-[10px] font-black uppercase text-gray-400 whitespace-nowrap">Reflection</button>
            <button onclick="switchStudentTab('behavior')" id="s-tab-behavior" class="pb-3 text-[10px] font-black uppercase text-gray-400 whitespace-nowrap">Behavior</button>
        </div>

        <div id="student-panels">
            <div id="s-panel-academic" class="s-panel space-y-6">
                <div class="p-6 card h-64"><canvas id="student-chart"></canvas></div>
                <div id="academic-logs" class="grid gap-4 md:grid-cols-2"></div>
            </div>
            <div id="s-panel-atl" class="s-panel hidden"><div class="grid gap-4 md:grid-cols-2" id="atl-logs"></div></div>
            <div id="s-panel-work" class="s-panel hidden"><div class="grid gap-4 md:grid-cols-2" id="work-logs"></div></div>
            <div id="s-panel-reflection" class="s-panel hidden"><div class="grid gap-4 md:grid-cols-2" id="reflection-logs"></div></div>
            <div id="s-panel-behavior" class="s-panel hidden"><div class="grid gap-4 md:grid-cols-2" id="behavior-logs"></div></div>
        </div>
    </div>

    <!-- STAFF DASHBOARD -->
    <div id="staff-dashboard" class="hidden max-w-6xl mx-auto fade-in">
        <div class="p-6 card mb-6 flex justify-between items-center">
            <h2 id="staff-welcome" class="font-black text-blue-900 uppercase text-xs tracking-widest">---</h2>
            <button onclick="location.reload()" class="text-red-500 font-bold text-[10px] uppercase">Logout</button>
        </div>
        <div class="p-12 card text-center bg-blue-50/50">
            <h3 class="text-xl font-black text-blue-900 mb-2 uppercase">Staff Verification Success</h3>
            <p class="text-gray-500 text-sm mb-8">Access to the digital portfolio logs is now authorized.</p>
            <a id="staff-link-btn" href="#" target="_blank" class="bg-blue-900 text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl inline-block">Management Console</a>
        </div>
    </div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzhpFMwQGJy5Y930TJnf4p_lTGCWnanXdP3gqg3SvPsBsnwsAMYNQytjuHv2QWMxTCm/exec"; 

    function initApp() { toggleLoginUI(); }
    function showLoading(s) { document.getElementById('loading').classList.toggle('hidden', !s); }
    function toggleLoginUI() {
        const isStaff = document.getElementById('role-select').value === 'staff';
        document.getElementById('student-box').classList.toggle('hidden', isStaff);
        document.getElementById('staff-box').classList.toggle('hidden', !isStaff);
    }

    async function runScript(method, ...args) {
        try {
            const url = `${WEB_APP_URL}?method=${method}&args=${encodeURIComponent(JSON.stringify(args))}`;
            const response = await fetch(url);
            const res = await response.json();
            return res.status === 'success' ? res.data : null;
        } catch (e) { return null; }
    }

    async function handleLogin() {
        const role = document.getElementById('role-select').value;
        showLoading(true);

        if (role === 'staff') {
            const email = document.getElementById('staff-email').value.trim().toLowerCase();
            if (!email) { showLoading(false); alert("Enter email."); return; }
            const profile = await runScript('getUserProfile', email);
            if (!profile || profile.roles.includes('guest')) {
                showLoading(false); alert("Email not found in Staff Registry."); return;
            }
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('staff-dashboard').classList.remove('hidden');
            document.getElementById('staff-welcome').innerText = `Verified: ${profile.email}`;
            document.getElementById('staff-link-btn').href = WEB_APP_URL;
        } else {
            const id = document.getElementById('access-code').value.trim();
            const list = await runScript('getVisibleStudents') || [];
            const student = list.find(s => s.id.toString().toLowerCase() === id.toLowerCase());
            if (student) { loadStudentView(student); } else { showLoading(false); alert("ID not found."); }
        }
    }

    async function loadStudentView(student) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('student-dashboard').classList.remove('hidden');
        document.getElementById('s-name').innerText = student.name;
        document.getElementById('s-id').innerText = `G${student.grade} | ID: ${student.id}`;

        const logs = await runScript('getStudentData', student.id) || [];
        
        // Categorization
        const academic = logs.filter(l => l.value && l.value.includes('%'));
        const work = logs.filter(l => l.note && l.note.toLowerCase().includes('http'));
        const reflect = logs.filter(l => (l.subject && l.subject.toLowerCase().includes('reflection')) || (l.note && l.note.toLowerCase().includes('reflect')));
        const behavior = logs.filter(l => (l.subject && l.subject.toLowerCase().includes('behavior')) || (l.note && l.note.toLowerCase().includes('behavior')));
        const atl = logs.filter(l => !academic.includes(l) && !work.includes(l) && !reflect.includes(l) && !behavior.includes(l));

        renderLogs('academic-logs', academic);
        renderLogs('atl-logs', atl);
        renderLogs('work-logs', work);
        renderLogs('reflection-logs', reflect);
        renderLogs('behavior-logs', behavior);
        if (academic.length > 0) renderChart(academic);
        showLoading(false);
    }

    function renderLogs(divId, data) {
        const div = document.getElementById(divId);
        if (!data.length) { div.innerHTML = '<p class="text-gray-300 text-[10px] font-bold py-10 uppercase col-span-full text-center tracking-widest">No Records</p>'; return; }
        div.innerHTML = data.map(l => `
            <div class="p-6 card">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[9px] font-black text-blue-500 uppercase">${l.subject}</span>
                    <span class="text-[9px] font-bold text-gray-300">${new Date(l.date).toLocaleDateString()}</span>
                </div>
                <div class="text-2xl font-black text-blue-900 mb-1">${l.value}</div>
                <p class="text-xs text-gray-600">${l.note}</p>
            </div>`).join('');
    }

    function switchStudentTab(t) {
        document.querySelectorAll('.s-panel').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('[id^="s-tab-"]').forEach(b => { b.classList.remove('tab-btn-active'); b.classList.add('text-gray-400'); });
        document.getElementById(`s-panel-${t}`).classList.remove('hidden');
        document.getElementById(`s-tab-${t}`).classList.add('tab-btn-active');
    }

    function renderChart(data) {
        const ctx = document.getElementById('student-chart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(l => new Date(l.date).toLocaleDateString()),
                datasets: [{ data: data.map(l => parseInt(l.value)), borderColor: '#1e3a8a', tension: 0.3, fill: false }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }
</script>
</body>
</html>
